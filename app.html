<!DOCTYPE html>
<html>
<head>
<title>Exam Time Table Generator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:500px;
margin:auto;
background:lightblue;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px yellow;
}

input{
padding:8px;
margin:5px;
width:70%;
}

button{
padding:8px 15px;
background:purple;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table,th,td{
border:1px solid black;
padding:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Exam Time Table Generator</h2>

<input type="text" id="subject" placeholder="Enter Subject">
<br>

<button onclick="addSubject()">Add Subject</button>
<button onclick="generateSchedule()">Generate Schedule</button>

<h3>Subjects</h3>
<ul id="list"></ul>

<table id="table">
<tr>
<th>Date</th>
<th>Subject</th>
<th> Exam Time</th>
  <th>Seat number</th>
</tr>
</table>

</div>

<script>

let subjects=[];

function addSubject(){

let sub=document.getElementById("subject").value;

if(sub===""){
alert("Enter subject");
return;
}

subjects.push(sub);

let li=document.createElement("li");
li.innerText=sub;

document.getElementById("list").appendChild(li);

document.getElementById("subject").value="";
}

function generateSchedule(){

let table=document.getElementById("table");

let date=new Date();

for(let i=0;i<subjects.length;i++){

date.setDate(date.getDate()+1);

let row=table.insertRow();

row.insertCell(0).innerText=date.toDateString();
row.insertCell(1).innerText=subjects[i];
row.insertCell(2).innerText="10:00AM - 1:00PM";
row.insertCell(3).innerText="32-101";



}

}

</script>

</body>
</html>
